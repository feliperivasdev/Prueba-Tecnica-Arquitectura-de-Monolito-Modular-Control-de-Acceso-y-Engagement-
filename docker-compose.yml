services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gym_backend_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: gym_backend_nginx
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      - app

  mysql:
    # 8.0 LTS: mejor soporte entre distros / primer arranque en equipos lentos
    image: mysql:8.0
    container_name: gym_backend_mysql
    environment:
      MYSQL_DATABASE: gym_backend
      MYSQL_USER: gym
      MYSQL_PASSWORD: gym
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: gym_backend_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

volumes:
  mysql_data:
  rabbitmq_data:
